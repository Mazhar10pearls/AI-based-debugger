name: Local CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Test, and Deploy Local App
    runs-on: [self-hosted, linux, vm-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r sample_app/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest sample_app/test_app.py

      - name: Build Docker image
        run: |
          chmod +x sample_app/deploy_local.sh
          sample_app/deploy_local.sh

      - name: Verify deployment
        run: |
          sleep 5
          python - <<'PY'
import urllib.request
res = urllib.request.urlopen('http://127.0.0.1:5000', timeout=10)
body = res.read().decode('utf-8')
if 'Hello from local AI DevOps app!' not in body:
    raise SystemExit('Deployment verification failed')
print('Deployment verified')
PY
