name: Auto Fix Failed Local CI

permissions:
  contents: write
  actions: write

on:
  workflow_run:
    workflows:
      - Local CI/CD Deploy
    types:
      - completed

jobs:
  auto-fix:
    # ── LOOP GUARD ────────────────────────────────────────────────────────────
    # Only run if:
    #   1. The triggering workflow actually failed
    #   2. The commit that caused it was NOT made by the bot itself
    #      (prevents: bot commits fix → CI fails again → bot runs again → ...)
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_commit.author.name != 'github-actions[bot]'

    name: Auto-Fix Failed Workflow and Retry
    runs-on: [self-hosted, linux, ai-runner]
    environment: prod
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml --quiet || true

      - name: Validate required secrets
        run: |
          : "${OLLAMA_API_URL:?Secret OLLAMA_API_URL is not set}"
          : "${OLLAMA_MODEL:?Secret OLLAMA_MODEL is not set}"
          : "${GH_PAT:?Secret GH_PAT is not set}"
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_MODEL:   ${{ secrets.OLLAMA_MODEL }}
          GH_PAT:         ${{ secrets.GH_PAT }}

      - name: Download failed workflow logs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, requests, zipfile, sys

          event_path = os.environ['GITHUB_EVENT_PATH']
          with open(event_path, 'r', encoding='utf-8') as f:
              event = json.load(f)

          run_id    = event['workflow_run']['id']
          repo_full = event['repository']['full_name']
          headers   = {
              'Authorization': f"Bearer {os.environ['GH_PAT']}",
              'Accept': 'application/vnd.github+json'
          }
          url = f'https://api.github.com/repos/{repo_full}/actions/runs/{run_id}/logs'

          resp = requests.get(url, headers=headers, timeout=120)
          if resp.status_code != 200:
              print(f'Failed to download logs: HTTP {resp.status_code} — {resp.text}', file=sys.stderr)
              sys.exit(1)

          with open('workflow_logs.zip', 'wb') as fh:
              fh.write(resp.content)

          extract_dir = pathlib.Path('logs')
          extract_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile('workflow_logs.zip', 'r') as zf:
              zf.extractall(extract_dir)

          out_path = pathlib.Path('failure.log')
          with out_path.open('w', encoding='utf-8') as out:
              for path in sorted(extract_dir.rglob('*.txt')):
                  out.write(f'=== {path.relative_to(extract_dir)} ===\n')
                  out.write(path.read_text(encoding='utf-8', errors='replace'))
                  out.write('\n\n')

          print(f'Generated failure.log ({out_path.stat().st_size} bytes)')
          PY

      - name: Check failure log is non-empty
        run: |
          if [ ! -s failure.log ]; then
            echo "failure.log is empty — nothing to fix."
            exit 1
          fi

      - name: Configure git with PAT remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"

      - name: Run auto-fixer on failure logs
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_MODEL:   ${{ secrets.OLLAMA_MODEL }}
        run: python3 auto-fixer.py --input failure.log

      # ── NO workflow_dispatch here ─────────────────────────────────────────
      # The auto-fixer already commits + pushes the fix to main.
      # That push event naturally triggers "Local CI/CD Deploy" on its own.
      # Adding an extra dispatch on top = double trigger + loop risk.
      # Remove the Re-trigger step entirely.

      - name: Summary
        if: success()
        run: |
          echo "✅ Fix committed and pushed."
          echo "Local CI/CD Deploy will re-run automatically from the new commit."