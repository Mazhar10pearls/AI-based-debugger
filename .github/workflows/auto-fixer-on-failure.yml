name: Auto Fix Failed Local CI

permissions:
  contents: write
  actions: write
  pull-requests: write
  issues: write

on:
  workflow_run:
    workflows:
      - Local CI/CD Deploy
    types:
      - completed

jobs:
  auto-fix:
    # Only run if CI failed AND the commit was NOT made by the bot
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_commit.author.name != 'github-actions[bot]'

    name: Auto-Fix Failed Workflow
    runs-on: [self-hosted, linux, ai-runner]
    environment: prod
    # ── CRITICAL FIX ─────────────────────────────────────────────────────────
    # Was 15 — killed the job before Ollama could finish.
    # Breakdown of 30-minute budget:
    #   ~1 min  : checkout + pip install + git setup
    #   ~1 min  : download + extract failure logs
    #   ~2 min  : repo file discovery + scoring
    #   ~8 min  : Ollama inference (2 attempts × 240s + 15s backoff)
    #   ~1 min  : validate + write + tests
    #   ~1 min  : git commit + push + open PR
    #   ─────────────────────────────────────────────────────────────
    #   ~14 min : expected | 30 min : hard ceiling with headroom
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ vars.GIT_BASE_BRANCH || 'develop' }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml --quiet

      - name: Validate required secrets
        run: |
          : "${OLLAMA_API_URL:?Secret OLLAMA_API_URL is not set}"
          : "${OLLAMA_MODEL:?Secret OLLAMA_MODEL is not set}"
          : "${GH_PAT:?Secret GH_PAT is not set}"
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_MODEL:   ${{ secrets.OLLAMA_MODEL }}
          GH_PAT:         ${{ secrets.GH_PAT }}

      - name: Download failed workflow logs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, requests, zipfile, sys

          event_path = os.environ['GITHUB_EVENT_PATH']
          with open(event_path, 'r', encoding='utf-8') as f:
              event = json.load(f)

          run_id    = event['workflow_run']['id']
          repo_full = event['repository']['full_name']
          headers   = {
              'Authorization': f"Bearer {os.environ['GH_PAT']}",
              'Accept': 'application/vnd.github+json'
          }
          url = f'https://api.github.com/repos/{repo_full}/actions/runs/{run_id}/logs'
          resp = requests.get(url, headers=headers, timeout=120)
          if resp.status_code != 200:
              print(f'Failed to download logs: HTTP {resp.status_code}', file=sys.stderr)
              sys.exit(1)

          with open('workflow_logs.zip', 'wb') as fh:
              fh.write(resp.content)

          extract_dir = pathlib.Path('logs')
          extract_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile('workflow_logs.zip', 'r') as zf:
              zf.extractall(extract_dir)

          out_path = pathlib.Path('failure.log')
          with out_path.open('w', encoding='utf-8') as out:
              for path in sorted(extract_dir.rglob('*.txt')):
                  out.write(f'=== {path.relative_to(extract_dir)} ===\n')
                  out.write(path.read_text(encoding='utf-8', errors='replace'))
                  out.write('\n\n')

          print(f'Generated failure.log ({out_path.stat().st_size} bytes)')
          PY

      - name: Check failure log is non-empty
        run: |
          if [ ! -s failure.log ]; then
            echo "failure.log is empty — nothing to fix."
            exit 1
          fi

      - name: Configure git with PAT remote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"

      # ── Smoke-test: verify Ollama is reachable before spending time on logs ─
      - name: Verify Ollama is reachable
        env:
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
        run: |
          # Strip /v1/completions suffix to get base URL for health check
          BASE_URL=$(echo "$OLLAMA_API_URL" | sed 's|/v1/completions||' | sed 's|/api/generate||')
          echo "Checking Ollama at: $BASE_URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL" || echo "000")
          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌ Ollama unreachable at $BASE_URL — aborting to save timeout budget"
            exit 1
          fi
          echo "✓ Ollama responded (HTTP $HTTP_CODE)"

      - name: Run auto-fixer
        env:
          OLLAMA_API_URL:     ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_MODEL:       ${{ secrets.OLLAMA_MODEL }}
          GITHUB_TOKEN:       ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GIT_BASE_BRANCH:    ${{ vars.GIT_BASE_BRANCH || 'develop' }}
          GIT_TARGET_BRANCH:  ${{ vars.GIT_TARGET_BRANCH || 'develop' }}
        run: python3 auto-fixer.py --input failure.log --skip-tests

      # ── If auto-fixer could not fix it → open a GitHub Issue ─────────────
      - name: Open issue if fixer failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue create \
            --title "🚨 Auto-fixer could not fix CI failure — manual review needed" \
            --body "The auto-fixer ran but could not produce a valid patch.

          **Git flow reminder:**
          - Fix manually on \`develop\` branch (never directly on \`main\`)
          - When ready: create \`release/*\` from \`develop\` → QA → merge to \`main\` + tag

          **Failed run:** ${{ github.event.workflow_run.html_url }}" \
            --label "bug" || true